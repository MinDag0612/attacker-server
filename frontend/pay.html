<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PAY</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            color: #111;
            background: #f4f6fb;
        }

        .card {
            max-width: 420px;
            margin: 0 auto;
            padding: 24px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 14px 30px rgba(32, 41, 56, 0.12);
        }

        h1 {
            margin: 0 0 16px;
            font-size: 24px;
        }

        button,
        input {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccd2df;
        }

        button {
            background: #0f766e;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 700;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        form {
            margin-top: 16px;
            display: none;
            gap: 12px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }

        #output {
            margin-top: 18px;
            padding: 14px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            min-height: 48px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>PAY</h1>
        <button id="payButton" type="button">PAY</button>

        <form id="paymentForm">
            <label for="machineId">Machine ID</label>
            <input id="machineId" name="machineId" type="text" placeholder="Enter machine ID" required />
            <button id="submitButton" type="submit">Submit</button>
        </form>

        <div id="output">Nhấn PAY để mở form.</div>
    </div>

    <script>
        const payButton = document.getElementById('payButton');
        const paymentForm = document.getElementById('paymentForm');
        const output = document.getElementById('output');
        const submitButton = document.getElementById('submitButton');

        payButton.addEventListener('click', () => {
            paymentForm.style.display = 'grid';
            output.textContent = 'Nhập machine ID và nhấn Submit.';
        });

        paymentForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const machineId = document.getElementById('machineId').value.trim();

            if (!machineId) {
                output.textContent = 'Vui lòng nhập machine ID.';
                return;
            }

            submitButton.disabled = true;
            output.textContent = 'Đang tải file...';

            try {
                // 🔥 trigger download thay vì fetch
                window.location.href =
                    `/api/get-private-key/${encodeURIComponent(machineId)}`;

                output.textContent = "Đã gửi yêu cầu tải file!";

            } catch (error) {
                output.textContent = `Lỗi: ${error.message}`;
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>

</html>
